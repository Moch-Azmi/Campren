<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CAMPREN</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@500&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="login-container">

        <div class="background-gradient">
            <!-- SVG LU BIARIN -->
        </div>

        <!-- FIX -->
        <form class="login-card" id="loginForm">

            <div class="login-header">

                <p class="welcome-text">Welcome To</p>

                <div class="logo">

                    <span class="logo-text">CAMPREN</span>

                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M13 2L3 14h8l-2 8 10-12h-8l2-8z"
                            fill="#5C5CDA"
                            stroke="#5C5CDA"
                            stroke-width="1"
                        />
                    </svg>

                    <p class="logo-tagline">
                        EXPLORE. ANALYZE. GROWTH.
                    </p>

                </div>

            </div>

            <div class="form-group">

                <label for="email" class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    id="email"
                    class="form-input"
                    placeholder="Insert your email"
                    autocomplete="email"
                />

            </div>

            <div class="form-group">

                <label for="password" class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="Insert your password"
                    autocomplete="current-password"
                />

            </div>

            <div class="forgot-password-wrapper">

                <a href="#" class="forgot-password">
                    Forgot password
                </a>

            </div>

            <p id="loginMessage" class="login-message"></p>

            <!-- FIX -->
            <button
                type="submit"
                class="btn btn-primary"
                id="signInBtn"
            >
                Sign In
            </button>

            <div class="signup-wrapper">

                <span class="signup-text">
                    Don't have an account?
                </span>

                <a href="#" class="signup-link">
                    Sign Up
                </a>

            </div>

        </form>

    </div>
    <canvas id="waveCanvas"></canvas>

    <div class="login-container">

        <div class="background-gradient">

    <script src="script.js"></script>

</body>
</html>
