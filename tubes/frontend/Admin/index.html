<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campren – Admin Dashboard</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../shared/page-state.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">

  <!-- LOGO -->
  <div class="sidebar-logo">

    <div class="logo-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#8A38F5"/>
        <path
          d="M7 18L12 11L16 15L20 8"
          stroke="white"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <circle
          cx="20"
          cy="8"
          r="2"
          fill="#a5f3fc"
        />
      </svg>
    </div>

    <div>
      <div class="logo-name">CAMPREN</div>
      <div class="logo-tagline">
        ADMIN PANEL
      </div>
    </div>

  </div>

  <!-- NAV -->
  <nav class="sidebar-nav">

    <div class="nav-group-label">
      ADMINISTRATION
    </div>

    <a href="#" class="nav-item active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      Overview
    </a >

  </nav>

  <!-- ADMIN BADGE PANEL -->
  <div class="target-panel admin-info-panel">
    <div class="target-label">SYSTEM STATE</div>
    <div class="system-status">
      <span class="status-dot online"></span>
      <span class="status-text">Connected to API</span>
    </div>
  </div>

</aside>

<!-- MAIN -->
<main class="main">

  <header class="topbar">

    <h1 class="page-title">
      Admin Overview
    </h1>

    <div class="topbar-right">
      <span class="admin-badge">ADMIN MODE</span>
      <button class="user-avatar" type="button" data-logout title="Logout" aria-label="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
    </div>

  </header>

  <div class="content">

    <!-- KPI GRID -->
    <div class="kpi-grid">

      <!-- TOTAL CAMPAIGNS -->
      <div class="kpi-card">
        <div class="kpi-top-label">
          TOTAL CAMPAIGNS
        </div>
        <div class="kpi-value campaigns-val" id="totalCampaigns">
          0
        </div>
      </div>

      <!-- SPEND -->
      <div class="kpi-card kpi-spend">
        <div class="kpi-top-label">
          TOTAL AD SPEND
        </div>
        <div class="kpi-value spend-val" id="totalSpend">
          Rp 0
        </div>
      </div>

      <!-- REVENUE -->
      <div class="kpi-card kpi-revenue">
        <div class="kpi-top-label">
          TOTAL REVENUE
        </div>
        <div class="kpi-value revenue-val" id="totalRevenue">
          Rp 0
        </div>
      </div>

      <!-- ROAS -->
      <div class="kpi-card kpi-roas">
        <div class="kpi-top-label">
          AVERAGE ROAS
        </div>
        <div class="kpi-value roas-val" id="avgRoas">
          0x
        </div>
      </div>

    </div>

    <!-- CAMPAIGN REPORT TABLE -->
    <div class="table-card">

      <div class="card-title">
        All System Campaigns Report
      </div>

      <div class="table-wrap">

        <table class="campaign-table">

          <thead>
            <tr>
              <th>CAMPAIGN</th>
              <th>USER ID</th>
              <th>CHANNEL</th>
              <th>TANGGAL MULAI</th>
              <th>TANGGAL AKHIR</th>
              <th>BUDGET</th>
              <th>AD SPEND</th>
              <th>REVENUE</th>
              <th>ROAS</th>
              <th>STATUS</th>
            </tr>
          </thead>

          <tbody id="adminCampaignsTableBody">
            <!-- Dynamically populated -->
          </tbody>

        </table>

      </div>

    </div>

  </div>

</main>

<div id="toast" class="toast"></div>

<script src="../shared/page-state.js"></script>
<script src="app.js"></script>

</body>
</html>
